{% extends 'base.html' %}

{% block page_title %}{{ action }} Mavzu{% endblock %}

{% block content %}
<div style="max-width:680px">
  <div class="card card-pad rise">
    <form method="post" style="display:flex;flex-direction:column;gap:18px">
      {% csrf_token %}
      <div class="field">
        <label>Mavzu nomi *</label>
        <input type="text" name="name" value="{{ topic.name|default:'' }}" class="input" placeholder="masalan: Sport" required>
      </div>
      <div class="field">
        <label>Kalit so'zlar (vergul bilan) *</label>
        <textarea name="keywords" rows="3" class="input textarea" placeholder="masalan: futbol, basketbol, tennis" required>{{ topic.keywords|default:'' }}</textarea>
        <span class="hint">Ushbu kalit so'zlarni o'z ichiga olgan maqolalar ushbu mavzu ostida tasniflanadi</span>
      </div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <a href="{% url 'dashboard:topic_list' %}" class="btn btn-ghost" style="flex:1;justify-content:center">Bekor qilish</a>
        <button type="submit" class="btn btn-primary" style="flex:1">
          <i class="fas fa-save"></i> {{ action }} Mavzu
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
