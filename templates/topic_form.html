{% extends 'base.html' %}

{% block page_title %}{{ action }} Topic{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Topic Name *</label>
                <input type="text" name="name" value="{{ topic.name|default:'' }}" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="e.g. Sports" required>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Keywords (comma-separated) *</label>
                <textarea name="keywords" rows="3" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="e.g. football, basketball, soccer, tennis" required>{{ topic.keywords|default:'' }}</textarea>
                <p class="text-sm text-gray-500 mt-1">Articles containing these keywords will be classified under this topic</p>
            </div>
            
            <div class="flex space-x-3 mt-6">
                <a href="{% url 'dashboard:topic_list' %}" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 text-center py-3 px-4 rounded-lg font-semibold">
                    Cancel
                </a>
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-lg font-semibold">
                    <i class="fas fa-save mr-2"></i>{{ action }} Topic
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
