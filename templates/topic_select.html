{% extends 'base.html' %}

{% block page_title %}Mavzu tanlash{% endblock %}
{% block page_subtitle %}Kanalingiz uchun mavzu tanlang{% endblock %}

{% block content %}
<div style="max-width:560px">
  <div class="card card-pad rise">
    <div class="field" style="margin-bottom:20px">
      <label>Mavzu *</label>
      <select id="topicSelect" class="input select-input">
        <option value="">Mavzu tanlang...</option>
        {% for topic in topics %}
        <option value="{{ topic.pk }}"
                data-name="{{ topic.name }}"
                data-keywords="{{ topic.keyword_list|join:', ' }}"
                data-articles="{{ topic.article_count }}"
                data-channels="{{ topic.channel_count }}">
          {{ topic.name }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div style="display:flex;gap:10px">
      <a id="continueBtn" href="#" style="display:none;flex:1;justify-content:center" class="btn btn-primary">
        <i class="fas fa-arrow-right"></i> Ushbu mavzu bilan kanal qo'shish
      </a>
      <a href="{% url 'dashboard:topic_list' %}" class="btn btn-ghost" style="flex:1;justify-content:center">Bekor qilish</a>
    </div>
  </div>
</div>

<script>
const sel = document.getElementById('topicSelect');
const btn = document.getElementById('continueBtn');
sel.addEventListener('change', function() {
  if (!this.value) { btn.style.display = 'none'; return; }
  btn.href = "{% url 'dashboard:channel_add' %}?topic=" + this.value;
  btn.style.display = 'flex';
});
</script>
{% endblock %}
